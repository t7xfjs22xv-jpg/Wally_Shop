<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.3); }
            50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.6); }
        }
        
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(102, 126, 234, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px 0;
            margin-bottom: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            animation: slideInDown 0.8s ease;
            position: relative;
            z-index: 1;
        }
        
        header h1 {
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 3.5em;
            font-weight: 800;
            letter-spacing: -2px;
            animation: float 4s ease-in-out infinite;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        main {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            animation: slideInUp 0.8s ease;
        }
        
        h2 {
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            border-bottom: 3px solid;
            border-image: linear-gradient(90deg, #667eea, #764ba2, #f093fb) 1;
            padding-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        ul {
            list-style: none;
            display: grid;
            gap: 15px;
        }
        
        li {
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.8), rgba(118, 75, 162, 0.8));
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: glow 3s ease-in-out infinite;
        }
        
        li::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s ease;
        }
        
        li:hover::before {
            left: 100%;
        }
        
        li:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.5);
            border-color: rgba(255, 255, 255, 0.6);
        }
        
        li a {
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 1;
        }
        
        li a span:first-child {
            flex: 1;
            transition: letter-spacing 0.3s ease;
        }
        
        li:hover a span:first-child {
            letter-spacing: 1px;
        }
        
        li a span:last-child {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }
        
        li:hover a span:last-child {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }
        
        .empty-message {
            text-align: center;
            color: white;
            font-size: 1.3em;
            padding: 60px 40px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(240, 147, 251, 0.3));
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            animation: slideInUp 0.8s ease;
        }
        
        .empty-message p:first-child {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .empty-message p:last-child {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 40px;
            font-size: 0.95em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            animation: slideInUp 1s ease;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5em;
            }
            
            main {
                padding: 25px;
            }
            
            h2 {
                font-size: 1.8em;
            }
            
            li a {
                flex-direction: column;
                text-align: center;
            }
            
            li a span:last-child {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛍️ My Shop</h1>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer>
            <p>✨ Welcome to the future of shopping ✨</p>
        </footer>
    </div>
</body>
</html>
