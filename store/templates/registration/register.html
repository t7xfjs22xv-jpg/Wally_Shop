{% extends 'store/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 card p-4 shadow-sm mt-5" style="border-radius: 15px;">
        <h3 class="text-center mb-4">🆕 Gawa Tayo ng Account</h3>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100 mt-3" style="border-radius: 10px;">Register na!</button>
        </form>
        <hr>
        <p class="text-center">May account ka na? <a href="{% url 'store:login' %}">Dito ka mag-login</a></p>
    </div>
</div>
{% endblock %}
