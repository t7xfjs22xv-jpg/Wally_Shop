{% extends 'base.html' %}
{% block content %}
<style>
    .auth-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .register-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        color: white;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 500px;
    }
    .btn-register {
        background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
        border: none;
        font-weight: bold;
        padding: 12px;
        border-radius: 10px;
        transition: 0.3s;
        color: white;
        width: 100%;
    }
    .btn-register:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
    }
    .login-link { color: #60a5fa; text-decoration: none; font-weight: bold; }
    .register-card p { margin-bottom: 15px; }
    .register-card input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.1);
        color: white;
    }
</style>

<div class="auth-wrapper">
    <div class="register-card">
        <h3 class="text-center mb-4">Create Account</h3>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-register mt-3">Register Now</button>
        </form>
        <hr style="border-color: rgba(255,255,255,0.2);">
        <p class="text-center">Already have an account? 
            <a href="{% url 'store:login' %}" class="login-link">Sign in here</a>
        </p>
    </div>
</div>
{% endblock %}
