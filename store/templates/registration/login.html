{% extends 'base.html' %}
{% block content %}
<style>
    /* Glass effect para sa login card */
    .login-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        color: white;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        margin-top: 80px;
    }
    /* Swabeng gradient button */
    .btn-login {
        background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        border: none;
        font-weight: bold;
        transition: 0.3s;
    }
    .btn-login:hover {
        transform: scale(1.05);
        filter: brightness(1.2);
    }
    .register-link { color: #4ade80; text-decoration: none; font-weight: bold; }
</style>

<div class="row justify-content-center">
    <div class="col-md-4 login-card">
        <h3 class="text-center mb-4">👟 Wally Shop Login</h3>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-login w-100 mt-3">PASOK NA! 🚀</button>
        </form>
        <p class="text-center mt-4">Wala pang account? 
            <a href="{% url 'store:register' %}" class="register-link">Gawa tayo dito</a>
        </p>
    </div>
</div>
{% endblock %}
