{% extends 'base.html' %}
{% block content %}
<style>
    .auth-wrapper {
        min-height: 75vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        color: white;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    .auth-card h3 {
        font-weight: 700;
        margin-bottom: 30px;
        letter-spacing: 1px;
    }

    /* Standardizing the Django form inputs */
    .auth-card p {
        text-align: left;
        margin-bottom: 15px;
    }

    .auth-card input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.1);
        color: white;
    }

    .btn-submit {
        background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        border: none;
        color: white;
        font-weight: bold;
        padding: 12px;
        border-radius: 10px;
        width: 100%;
        margin-top: 20px;
        transition: 0.3s;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
    }

    .auth-link {
        color: #4ade80;
        text-decoration: none;
        font-weight: 600;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <h3>Member Login</h3>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Sign In</button>
        </form>
        <p class="text-center mt-4" style="text-align: center;">
            New member? <a href="{% url 'store:register' %}" class="auth-link">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
